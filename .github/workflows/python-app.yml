# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Generate 365 Days Meals

on:
  push:
    branches: [ "main" ]  # 每次推送代码时运行
  workflow_dispatch:      # 允许你在 GitHub 页面上手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 开启缓存，加快后续运行速度

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 强制直接安装，不依赖 requirements.txt 以排除文件路径问题
        pip install google-generativeai
        # 打印已安装列表，让我们在日志里确认是否有 google-generativeai
        pip list

    - name: Run meal generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # 使用 python -m 确保使用当前环境的包
        python -m generate_365

    - name: Commit and Push changes
      # 这一步非常重要：脚本生成的 meals_365.json 需要推回仓库保存
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add meals_365.json
        # 只有在文件有变动时才提交，防止报错
        git diff --quiet && git diff --staged --quiet || git commit -m "Update meals_365.json [skip ci]"
        git push
